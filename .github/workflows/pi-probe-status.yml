# Hardware bench check: use probe-rs on the Pi to read a connected board's
# status and its ARM core ID (SCB CPUID @ 0xE000ED00). Targets the NUCLEO-F429ZI
# (Cortex-M4) via its ST-Link/V2.1.
#
# The job runs on the runner and invokes `docker run` itself (rather than a
# `container:` block) so we fully control the USB device flags — GitHub's
# container.options parser would split "--device-cgroup-rule=c 189:* rmw" on the
# spaces and corrupt the rule.
name: Pi Probe Status

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: pi-probe-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe-status:
    runs-on: [self-hosted, rust, ct, arm64]
    env:
      IMAGE: localhost:5000/hwprobe:latest
      PROBE: "0483:374b:0672FF494849887767184220"   # NUCLEO-F429ZI ST-Link/V2.1
      CHIP: "STM32F429ZITx"
      EXPECT_PART: "c24"                             # Cortex-M4
    steps:
      - name: Read board status + ARM core ID via probe-rs
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --device-cgroup-rule='c 189:* rmw' \
            -v /dev/bus/usb:/dev/bus/usb \
            -e PROBE -e CHIP -e EXPECT_PART \
            "$IMAGE" bash -c '
              set -euo pipefail

              echo "::group::Attached debug probes"
              probe-rs list
              echo "::endgroup::"

              echo "::group::Target debug port / core (SWD)"
              probe-rs info --probe "$PROBE" 2>/dev/null | grep -iE "Debug Port|Cortex" || true
              echo "::endgroup::"

              echo "Reading SCB CPUID @ 0xE000ED00 ..."
              CPUID=$(probe-rs read --chip "$CHIP" --probe "$PROBE" b32 0xE000ED00 1 2>/dev/null | tr -d "[:space:]")
              v=$((16#$CPUID))
              imp=$(( (v>>24)&0xff )); var=$(( (v>>20)&0xf )); part=$(( (v>>4)&0xfff )); rev=$(( v&0xf ))
              ph=$(printf "%03x" "$part")
              case "$ph" in
                c20) core="Cortex-M0";;  c60) core="Cortex-M0+";; c21) core="Cortex-M1";;
                c23) core="Cortex-M3";;  c24) core="Cortex-M4";;  c27) core="Cortex-M7";;
                d20) core="Cortex-M23";; d21) core="Cortex-M33";; *) core="unknown";;
              esac
              echo "CPUID    = 0x$CPUID"
              printf  "ARM core = %s (implementer 0x%02x, part 0x%s, r%dp%d)\n" "$core" "$imp" "$ph" "$var" "$rev"

              if [ "$ph" != "$EXPECT_PART" ]; then
                echo "::error::Expected part 0x$EXPECT_PART, got 0x$ph"; exit 1
              fi
              echo "✅ Board alive on the bench: $core, CPUID 0x$CPUID"
            '
