name: CT Verify

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  panic-audit:
    strategy:
      fail-fast: false
      matrix:
        triple: [thumbv7m-none-eabi, riscv32imc-unknown-none-elf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.86"
          targets: ${{ matrix.triple }}
          components: llvm-tools-preview
      - name: Install krabi-caliper
        run: cargo install krabi-caliper --git https://github.com/kaidokert/krabi-caliper-rs --tag v0.1.0-alpha.4 --features cli,campaign
      - name: Run panic-free audit
        run: |
          cargo krabi-caliper panic-audit \
            --workspace . \
            --package panic-free-audit \
            --target ${{ matrix.triple }} \
            --negative-features neg-controls \
            --owned-symbol '.*' \
            --expect-negative panic_audit__neg__bounds_check \
            --expect-negative panic_audit__neg__unwrap \
            --expect-negative panic_audit__neg__expect \
            --json target/panic-audit/${{ matrix.triple }}.json

  panic-audit-diagnostics:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        triple: [thumbv7m-none-eabi, riscv32imc-unknown-none-elf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.86"
          targets: ${{ matrix.triple }}
          components: llvm-tools-preview
      - name: Install krabi-caliper
        run: cargo install krabi-caliper --git https://github.com/kaidokert/krabi-caliper-rs --tag v0.1.0-alpha.4 --features cli,campaign
      - name: Run diagnostic panic-free audit
        run: |
          cargo krabi-caliper panic-audit \
            --workspace . \
            --package panic-free-audit \
            --target ${{ matrix.triple }} \
            --features diagnostic-ct-scans,diagnostic-nonzero-div \
            --negative-features neg-controls \
            --owned-symbol '.*' \
            --expect-negative panic_audit__neg__bounds_check \
            --expect-negative panic_audit__neg__unwrap \
            --expect-negative panic_audit__neg__expect \
            --json target/panic-audit/diagnostic-${{ matrix.triple }}.json

  ct:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Priority 1: Cortex-M3/M4
          - triple: thumbv7em-none-eabi
            toolchain: "1.86"
          - triple: thumbv7m-none-eabi
            toolchain: "1.86"
          # Priority 2: Cortex-M0
          - triple: thumbv6m-none-eabi
            toolchain: "1.86"
          # Priority 3: 32-bit RISC-V
          - triple: riscv32imc-unknown-none-elf
            toolchain: "1.86"
          - triple: riscv32imac-unknown-none-elf
            toolchain: "1.86"
          # Priority 5: aarch64
          - triple: aarch64-unknown-linux-gnu
            toolchain: "1.86"
          # Priority 6: x86_64. +lzcnt,+bmi1 mirrors ct-ctgrind.yml:
          # baseline-x86_64 lowers `u32::leading_zeros()` to
          # `test/je/bsr` (bsr undefined on zero, hence the `je`), a
          # real data-dependent branch in the std intrinsic. BMI1 is
          # on Haswell+ (2013) and every GitHub Actions x86_64 runner.
          - triple: x86_64-unknown-linux-gnu
            toolchain: "1.86"
            extra_rustflags: "-C target-feature=+lzcnt,+bmi1"
          # Priority 4: AVR (nightly-only, needs build-std + target-cpu).
          # Bare `nightly` because rust-std for avr-none isn't published
          # on every nightly date — a pinned date risks the AVR job
          # failing at component install rather than at verification.
          - triple: avr-none
            toolchain: nightly
            extra_components: rust-src
            extra_rustflags: "-C target-cpu=atmega328p"
    runs-on: ubuntu-latest
    name: ${{ matrix.triple }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          # AVR is tier 3 — rust-std isn't published as a downloadable
          # component, so `rustup target add avr-none` fails. We build
          # core from source via -Z build-std=core (see rust-src below)
          # so the precompiled std isn't needed.
          #
          # NB: GitHub Actions ternary needs polarity-flip here. The
          # natural `X == 'avr-none' && '' || X` short-circuits to X
          # because `''` is falsy in `||`. The form below resolves to
          # `''` on AVR and `X` everywhere else.
          targets: ${{ matrix.triple != 'avr-none' && matrix.triple || '' }}
          components: llvm-tools-preview${{ matrix.extra_components && ', ' || '' }}${{ matrix.extra_components }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ct-verify-${{ matrix.triple }}

      - name: Scope per-target RUSTFLAGS to the cross-build
        # Cargo recognises CARGO_TARGET_<TRIPLE>_RUSTFLAGS (triple
        # uppercased with `-` → `_`) and applies it only when building
        # for that target. We compute the var name here so each matrix
        # row's `extra_rustflags` lands in the right place without
        # leaking into the host ct-driver compile.
        if: matrix.extra_rustflags != ''
        run: |
          name="CARGO_TARGET_$(echo '${{ matrix.triple }}' | tr 'a-z-' 'A-Z_')_RUSTFLAGS"
          echo "$name=${{ matrix.extra_rustflags }}" >> "$GITHUB_ENV"

      - name: Run ct-driver
        run: cargo run --release -p ct-driver -- --target ${{ matrix.triple }} --json-out target/ct-report/${{ matrix.triple }}.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ct-report-${{ matrix.triple }}
          path: target/ct-report/
          retention-days: 30
